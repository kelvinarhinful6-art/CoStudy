spring:
  application:
    name: tutoring-service
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: tutoring
    open-in-view: false
  mvc:
    # Unmapped requests (e.g. removed endpoints) throw NoHandlerFoundException
    # so the handler above can return a clean 404 instead of a static-resource 500.
    throw-exception-if-no-handler-found: true
  web:
    # This is a pure API: don't serve static resources, otherwise every
    # unmapped path falls through to the static handler (500) instead of 404.
    resources:
      add-mappings: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

# All dev-configurable. Currency GHS for Ghana.
billing:
  currency: GHS
  commission-pct: 50        # platform keeps 50% of each session fee
  pro:
    price: 49.99
    currency: GHS
    months: 1

