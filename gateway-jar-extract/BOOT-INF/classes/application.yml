spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: auth
          uri: http://auth-service:8080
          predicates:
            - Path=/api/auth/**
        - id: learning
          uri: http://learning-service:8080
          predicates:
            - Path=/api/groups/**,/api/matching/**,/api/invites/**,/api/study/**
        # WebSocket (STOMP) chat is proxied through the gateway on :8080 so the
        # mobile app only needs the one API host/port it already reaches.
        - id: learning-ws
          uri: ws://learning-service:8080
          predicates:
            - Path=/ws,/ws/**
        # Tutor assessment PDFs are served by tutoring-service at
        # /uploads/questions/**. Applicants download them through the gateway,
        # so this MUST be matched before the learning-service /uploads/** route
        # below (route order matters) â€” otherwise the download 404s.
        - id: tutoring-uploads
          uri: http://tutoring-service:8080
          predicates:
            - Path=/uploads/questions/**
          filters:
            - StripPrefix=0
        # Uploaded chat media (images/files) is served by learning-service at
        # /uploads/chat/**. The app fetches it from the same gateway host/port
        # (FILE_HOST), so the gateway must proxy it too â€” otherwise every
        # media GET 404s and attachments are invisible / unopenable.
        - id: learning-uploads
          uri: http://learning-service:8080
          predicates:
            - Path=/uploads/**
          filters:
            - StripPrefix=0
        - id: tutoring
          uri: http://tutoring-service:8080
          predicates:
            - Path=/api/tutor-applications/**,/api/admin/**,/api/tutors/**,/api/subscriptions/**,/api/bookings/**,/api/reviews/**,/api/courses/**
        - id: engagement
          uri: http://engagement-service:8080
          predicates:
            - Path=/api/notifications/**,/api/analytics/**,/api/ads/**

        - id: payment
          uri: http://payment-service:8080
          predicates:
            - Path=/api/payments/**
server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
